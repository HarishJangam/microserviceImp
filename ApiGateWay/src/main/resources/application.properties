spring.config.import=optional:configserver:http://localhost:8085

spring.cloud.gateway.server.webmvc.routes[0].id=USERSERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=HOTELS
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://HOTELS
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/hotels/**,/employes/**


spring.cloud.gateway.server.webmvc.routes[2].id=RATINGSERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://RATINGSERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/ratings/**


